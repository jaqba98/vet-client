<nav class="nav-view">
  <!-- Menu -->
  <div class="nav-view__menu">
    <!-- Hamburger -->
    <div class="nav-view__menu--hamburger">
      <lib-button-control [model]="hamburgerModel" (event)="onHamburgerEvent($event)"></lib-button-control>
    </div>
    <!-- Options -->
    <div class="nav-view__menu--options">
      <lib-nav-options-form></lib-nav-options-form>
    </div>
  </div>
  <!-- Logo -->
  <div class="nav-view__logo">
    <lib-icon-control [model]="logoModel"></lib-icon-control>
    <p>{{ title }}</p>
  </div>
  <!-- Dynamic content-->
  <div class="nav-view__dynamic">
    <ng-content></ng-content>
  </div>
</nav>
