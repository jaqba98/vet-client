<lib-section-control sectionId="price" [backgroundPrimary]="true" [flexCenter]="true">
  <div class="price-view">
    <lib-price-control
      [type]="'Basic'"
      [description]="'Essential features for pet owners and veterinarians.'"
      [money]="'9.99'"
      [elements]="[
      'Appointment Scheduling',
      'Basic Pet Records',
      'Email Notifications',
      'Veterinarian Directory'
    ]"
    ></lib-price-control>
    <lib-price-control
      [type]="'Pro'"
      [description]="'Advanced features for better pet healthcare management.'"
      [money]="'19.99'"
      [elements]="[
        'Everything in Basic',
        'Video Consultations',
        'Prescription Tracking',
        '24/7 Customer Support',
        'Medical History Export'
      ]"
    ></lib-price-control>
    <lib-price-control
      [type]="'Premium'"
      [description]="'The ultimate package for pet care and veterinary professionals.'"
      [money]="'29.99'"
      [elements]="[
      'Everything in Pro',
      'AI Health Analysis',
      'Pet Insurance Integration',
      'Multi-Pet Management',
      'Exclusive Discounts on Vet Services'
    ]"
    ></lib-price-control>
  </div>
</lib-section-control>
