<lib-section-control
  [sectionId]="sectionId"
  [sectionContentFlex]="true"
  [sectionContentJustifyCenter]="true"
  [sectionContentGap2rem]="true"
>
  <lib-price-control
    title="Basic"
    description="Essential features for pet owners and veterinarians."
    price="$ 9.99"
    [elements]="[
      'Appointment Scheduling',
      'Basic Pet Records',
      'Email Notifications',
      'Veterinarian Directory'
    ]"
  ></lib-price-control>
  <lib-price-control
    title="Pro"
    description="Advanced features for better pet healthcare management."
    price="$ 19.99"
    [elements]="[
      'Everything in Basic',
      'Video Consultations',
      'Prescription Tracking',
      '24/7 Customer Support',
      'Medical History Export'
    ]"
  ></lib-price-control>
  <lib-price-control
    title="Premium"
    description="The ultimate package for pet care and veterinary professionals."
    price="$ 29.99"
    [elements]="[
      'Everything in Pro',
      'AI Health Analysis',
      'Pet Insurance Integration',
      'Multi-Pet Management',
      'Exclusive Discounts on Vet Services'
    ]"
  ></lib-price-control>
</lib-section-control>
