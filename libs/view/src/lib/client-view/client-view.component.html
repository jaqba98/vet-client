<lib-section-control
  [sectionId]="sectionId"
  [sectionMinHeightFull]="true"
  [sectionBackgroundSurface]="true"
  [sectionContentMarginAuto]="true"
  [sectionContentMaxWidth960px]="true"
  [sectionContentFlex]="true"
  [sectionContentFlexDirectionColumn]="true"
  [sectionContentFlexGapSmall]="true"
>
  <lib-text-control textControlColor="primary" tag="h2">
    <ng-container h2>Hello {{firstName}} {{lastName}}! You are a client.</ng-container>
  </lib-text-control>
</lib-section-control>
