<!-- done -->
<form class="base-form" [formGroup]="formGroup" (ngSubmit)="onSubmit()" [ngClass]="getClassList()">
  <ng-container *ngFor="let control of controlsArray">
    <!-- Input-->
    <ng-container *ngIf="control.model.kind === 'input'">
      <div class="base-form__input">
        <lib-input-control
          [formGroup]="formGroup"
          [controlName]="control.name"
          [model]="control.model"
          [isError]="isControlError(control.name)"
        ></lib-input-control>
        <ng-container *ngIf="isControlError(control.name)">
          <lib-error-control [message]="getErrorMessage(control.name)"></lib-error-control>
        </ng-container>
      </div>
    </ng-container>
    <!-- Textarea -->
    <ng-container *ngIf="control.model.kind === 'textarea'">
      <div class="base-form__textarea">
        <lib-textarea-control
          [formGroup]="formGroup"
          [controlName]="control.name"
          [model]="control.model"
          [isError]="isControlError(control.name)"
        ></lib-textarea-control>
        <ng-container *ngIf="isControlError(control.name)">
          <lib-error-control [message]="getErrorMessage(control.name)"></lib-error-control>
        </ng-container>
      </div>
    </ng-container>
    <!-- Radio button -->
    <ng-container *ngIf="control.model.kind === 'radio-button'">
      <lib-radio-button-control
        [formGroup]="formGroup"
        [controlName]="control.name"
        [model]="control.model"
      ></lib-radio-button-control>
    </ng-container>
    <!-- Button -->
    <ng-container *ngIf="control.model.kind === 'button'">
      <lib-button-control [model]="control.model" (event)="onButtonEvent(control.name)"></lib-button-control>
    </ng-container>
  </ng-container>
</form>
