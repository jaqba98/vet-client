<form [formGroup]="formGroup" (ngSubmit)="onSubmit()">
  <ng-container *ngFor="let control of baseForm.controls">
    <!-- Input control-->
    <ng-container *ngIf="control.kind === 'input'">
      <lib-input-control
        [formGroup]="formGroup"
        [controlName]="control.name"
        [model]="control"
      ></lib-input-control>
    </ng-container>
    <!-- Button control -->
    <ng-container *ngIf="control.kind === 'button'">
      <lib-button-control [model]="control"></lib-button-control>
    </ng-container>
  </ng-container>
</form>
