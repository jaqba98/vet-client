<div class="radio-button-control" [formGroup]="formGroup">
  <ng-container *ngFor="let option of model.options">
    <div class="radio-button-control__radio">
      <input
        type="radio"
        [id]="option"
        [name]="model.name"
        [value]="option.value"
        [formControlName]="controlName"
      >
      <label [for]="option">
        <lib-text-control textControlColor="dark-secondary">{{ option.label }}</lib-text-control>
      </label>
    </div>
  </ng-container>
</div>
