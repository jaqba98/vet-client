<div class="card-control" [ngStyle]="{ width: width }">
  <div class="card-control__headline">
    <lib-text-control tag="h3" textControlColor="primary">
      <ng-container h3>{{ title }}</ng-container>
    </lib-text-control>
  </div>
  <div class="card-control__content">
    <ng-content></ng-content>
  </div>
</div>
