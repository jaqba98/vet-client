<div class="textarea-control" [formGroup]="formGroup">
  <ng-container *ngIf="isLabel()">
    <label [for]="controlName">
      <lib-text-control [textControlColor]="getLabelColor()">{{ model.label }}</lib-text-control>
    </label>
  </ng-container>
  <textarea
    class="textarea-control__textarea"
    [id]="controlName"
    [formControlName]="controlName"
    [placeholder]="model.placeholder"
    [ngClass]="{ 'textarea-control__textarea--error': isError }"
    [ngStyle]="{ height: model.height }"
  ></textarea>
</div>
