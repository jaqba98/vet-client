<div class="input-control" [formGroup]="formGroup">
  <ng-container *ngIf="isLabel()">
    <label [for]="controlName">
      <ng-container *ngIf="isError; else notErrorLabel">
        <lib-text-control color="error">{{model.label}}</lib-text-control>
      </ng-container>
      <ng-template #notErrorLabel>
        <lib-text-control color="dark-secondary">{{model.label}}</lib-text-control>
      </ng-template>
    </label>
  </ng-container>
  <input
    class="input-control__input"
    [id]="controlName"
    [formControlName]="controlName"
    [type]="model.type"
    [placeholder]="model.placeholder"
    [ngClass]="{ 'input-control__input--error': isError }"
  >
</div>
