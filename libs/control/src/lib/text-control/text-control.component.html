<ng-container *ngIf="tag === 'p'">
  <p [ngClass]="getClassList()">{{ content }}</p>
</ng-container>

<ng-container *ngIf="tag === 'h1'">
  <h1 [ngClass]="getClassList()">{{ content }}</h1>
</ng-container>

<ng-container *ngIf="tag === 'h2'">
  <h2 [ngClass]="getClassList()">{{ content }}</h2>
</ng-container>

<ng-container *ngIf="tag === 'h3'">
  <h3 [ngClass]="getClassList()">{{ content }}</h3>
</ng-container>

<ng-container *ngIf="tag === 'h4'">
  <h4 [ngClass]="getClassList()">{{ content }}</h4>
</ng-container>

<ng-container *ngIf="tag === 'h5'">
  <h5 [ngClass]="getClassList()">{{ content }}</h5>
</ng-container>

<ng-container *ngIf="tag === 'h6'">
  <h6 [ngClass]="getClassList()">{{ content }}</h6>
</ng-container>
