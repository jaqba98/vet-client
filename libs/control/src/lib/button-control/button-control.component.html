<div class="button-control">
  <button class="button-control__button" type="submit" [ngClass]="getClassList()" (click)="onClick(model.id)">
    <!-- Text-->
    <ng-container *ngIf="model.type === 'text'">
      <lib-text-control tag="p" textControlColor="light-primary">{{ model.text }}</lib-text-control>
    </ng-container>
    <!-- Icon-->
    <ng-container *ngIf="model.type === 'icon'">
      <lib-icon-control [model]="model"></lib-icon-control>
    </ng-container>
    <!-- Link-->
    <ng-container *ngIf="model.type === 'link'">
      <lib-text-control tag="p" textControlColor="light-primary">{{ model.text }}</lib-text-control>
    </ng-container>
  </button>
</div>
