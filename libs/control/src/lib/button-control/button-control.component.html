<button class="button" (click)="onClick()">
  <ng-container *ngIf="model.type === 'text'">
    <lib-text-control [text]="model.text"></lib-text-control>
  </ng-container>
  <ng-container *ngIf="model.type === 'icon'">
    <lib-icon-control [model]="model.icon"></lib-icon-control>
  </ng-container>
</button>
