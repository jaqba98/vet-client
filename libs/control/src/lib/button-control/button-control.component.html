<button [ngClass]="getClassList()" type="submit" (click)="onClick(model.id)">
  <!-- Text -->
  <ng-container *ngIf="model.value.type === 'text'">{{ model.value.text }}</ng-container>
  <!-- Icon -->
  <ng-container *ngIf="model.value.type === 'icon'">
    <lib-icon-control [model]="model.value.icon"></lib-icon-control>
  </ng-container>
</button>
