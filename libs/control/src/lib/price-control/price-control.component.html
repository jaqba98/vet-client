<lib-card-control [title]="title" maxWidth="300px">
  <lib-text-control tag="h1" [content]="price" color="primary"></lib-text-control>
  <lib-text-control [content]="description" color="dark-secondary"></lib-text-control>
  <hr>
  <ul class="list">
    <ng-container *ngFor="let element of elements">
      <li class="list__element">
        <lib-text-control color="dark-secondary" [content]="element"></lib-text-control>
      </li>
    </ng-container>
  </ul>
  <lib-button-control [model]="buttonModel"></lib-button-control>
</lib-card-control>
