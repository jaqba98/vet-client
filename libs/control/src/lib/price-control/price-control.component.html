<lib-card-control [title]="title" width="300px">
  <lib-text-control tag="h1" textControlColor="dark-primary">
    <ng-container h1>{{ price }}</ng-container>
  </lib-text-control>
  <lib-text-control textControlColor="dark-secondary">{{description}}</lib-text-control>
  <hr>
  <ul class="list">
    <ng-container *ngFor="let element of elements">
      <li>
        <lib-text-control textControlColor="dark-secondary">{{ element }}</lib-text-control>
      </li>
    </ng-container>
  </ul>
  <lib-button-control [model]="buttonModel"></lib-button-control>
</lib-card-control>
