<lib-card-control title="">
  <div class="price">
    <h2 class="price__type">{{ type }}</h2>
    <p class="price__description">{{ description }}</p>
    <p class="price__money">$ {{ money }}</p>
    <hr>
    <ul class="price__list">
      <ng-container *ngFor="let el of elements">
        <li class="price__element">{{ el }}</li>
      </ng-container>
    </ul>
    <lib-button-control [model]="buttonModel"></lib-button-control>
  </div>
</lib-card-control>
