<lib-table-card-control title="Edit">
  <lib-base-form
    [formGroup]="formGroup"
    [controlsArray]="controlsArray"
    [success]="store.editSuccess$ | async"
    [error]="store.editError$ | async"
    [resetForm]="false"
    (event)="onEditEvent($event)"
  ></lib-base-form>
</lib-table-card-control>
