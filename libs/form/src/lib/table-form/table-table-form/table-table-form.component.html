<table class="table">
  <tr class="table__row">
    <th class="table__column"></th>
    <ng-container *ngFor="let header of headers">
      <td class="table__column">{{ header }}</td>
    </ng-container>
    <th class="table__column"></th>
    <th class="table__column"></th>
  </tr>
  <ng-container *ngFor="let row of rows">
    <tr class="table__row">
      <ng-container *ngIf="row.isSelected; else isUnselected">
        <td class="table__column table__column--button">
          <lib-button-control
            [model]="selectButtonModel"
            (click)="onUnselectButtonClick(row.id)"
          ></lib-button-control>
        </td>
      </ng-container>
      <ng-template #isUnselected>
        <td class="table__column table__column--button">
          <lib-button-control
            [model]="unselectButtonModel"
            (click)="onSelectButtonClick(row.id)"
          ></lib-button-control>
        </td>
      </ng-template>
      <ng-container *ngFor="let column of getColumns(row)">
        <td class="table__column">{{ getColumn(row, column) }}</td>
      </ng-container>
      <td class="table__column table__column--button">
        <lib-button-control
          [model]="editButtonModel"
          (click)="onEditButtonClick(row.id)"
        ></lib-button-control>
      </td>
      <td class="table__column table__column--button">
        <lib-button-control
          [model]="removeButtonModel"
          (click)="onRemoveButtonClick(row.id)"
        ></lib-button-control>
      </td>
    </tr>
  </ng-container>
</table>
