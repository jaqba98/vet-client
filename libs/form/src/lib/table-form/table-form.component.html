<lib-table-panel-control [isPaginator]="isPaginator()">
  <ng-container nav>
    <lib-table-nav-form
      [rows]="rows"
      [store]="store"
      [crud]="crud"
      [tableButtonEnabled]="tableButtonEnabled"
      [createButtonEnabled]="createButtonEnabled"
      [deleteButtonEnabled]="deleteButtonEnabled"
      [refreshButtonEnabled]="refreshButtonEnabled"
      [searchButtonEnabled]="searchButtonEnabled"
      (tableNavRefreshEvent)="onTableNavRefreshEvent()"
    ></lib-table-nav-form>
  </ng-container>
  <ng-container content>
    <ng-container [ngSwitch]="tab">
      <ng-container *ngSwitchCase="'table'">
        <lib-table-data-form
          [formModel]="formModel"
          [crudNotification]="crudNotification"
          [rows]="rows"
          [store]="store"
          [allSelected]="allSelected"
          [crud]="crud"
        ></lib-table-data-form>
      </ng-container>
      <ng-container *ngSwitchCase="'create'">
        <lib-table-create-form [formModel]="formModel" [crudNotification]="crudNotification"></lib-table-create-form>
      </ng-container>
    </ng-container>
  </ng-container>
  <ng-container paginator>
    <p>paginator</p>
  </ng-container>
</lib-table-panel-control>
