<lib-table-panel-control [isPaginator]="isPaginator()">
  <ng-container nav>
    <lib-table-nav-form
      [store]="store"
      [crud]="crud"
      [select]="select"
      [name]="name"
      [tableButtonEnabled]="tableButtonEnabled"
      [createButtonEnabled]="createButtonEnabled"
      [deleteButtonEnabled]="deleteButtonEnabled"
      [refreshButtonEnabled]="refreshButtonEnabled"
    ></lib-table-nav-form>
  </ng-container>
  <ng-container content>
    <ng-container [ngSwitch]="tab">
      <ng-container *ngSwitchCase="'table'">
        <lib-table-data-form
          [formModel]="formModel"
          [crud]="crud"
          [store]="store"
          [select]="select"
          [name]="name"
          [deleteButtonEnabled]="deleteButtonEnabled"
          [updateButtonEnabled]="updateButtonEnabled"
          [headers]="headers"
        ></lib-table-data-form>
      </ng-container>
      <ng-container *ngSwitchCase="'create'">
        <lib-table-create-form [formModel]="formModel" [crud]="crud"></lib-table-create-form>
      </ng-container>
      <ng-container *ngSwitchCase="'update'">
        <lib-table-update-form
          [formModel]="formModel"
          [crud]="crud"
          [store]="store"
          [select]="select"
        ></lib-table-update-form>
      </ng-container>
    </ng-container>
  </ng-container>
  <ng-container paginator>
    <lib-table-paginator-form
      [select]="select"
      [store]="store"
      [path]="path"
      [name]="name"
    ></lib-table-paginator-form>
  </ng-container>
</lib-table-panel-control>
