<lib-table-control>
  <ng-container nav>
    <lib-table-nav-form
      [tableNavFormTableButton]="tableNavFormTableButton"
      [tableNavFormAddButton]="tableNavFormAddButton"
      [tableNavFormRemoveButton]="tableNavFormRemoveButton"
      [tableNavFormRefreshButton]="tableNavFormRefreshButton"
      [tableNavFormSearchButton]="tableNavFormSearchButton"
      (event)="onTableNavFormEvent($event)"
    ></lib-table-nav-form>
  </ng-container>
  <ng-container content>
    <lib-table-add-form [tableFormModel]="tableFormModel" (event)="onTableAddFormEvent($event)"></lib-table-add-form>
  </ng-container>
  <ng-container paginator>
    <p>paginator</p>
  </ng-container>
</lib-table-control>
