<lib-table-panel-control>
  <ng-container nav>
    <lib-table-nav-form
      [tableButtonEnabled]="tableButtonEnabled"
      [addButtonEnabled]="addButtonEnabled"
      [removeButtonEnabled]="removeButtonEnabled"
      [refreshButtonEnabled]="refreshButtonEnabled"
      [searchButtonEnabled]="searchButtonEnabled"
      (event)="onTableNavFormEvent($event)"
    ></lib-table-nav-form>
  </ng-container>
  <ng-container content>
    <ng-container [ngSwitch]="tableTab">
      <ng-container *ngSwitchCase="'table'">
        <lib-table-table-form [service]="tableForm"></lib-table-table-form>
      </ng-container>
      <ng-container *ngSwitchCase="'add'">
        <lib-table-add-form [formModel]="formModel" (event)="onTableAddFormEvent($event)"></lib-table-add-form>
      </ng-container>
      <ng-container *ngSwitchDefault>
        <p>default</p>
      </ng-container>
    </ng-container>
  </ng-container>
  <ng-container paginator>
    <p>paginator</p>
  </ng-container>
</lib-table-panel-control>
