<lib-table-panel-control>
  <ng-container nav>
    <lib-table-nav-form
      [store]="store"
      [tableButtonEnabled]="tableButtonEnabled"
      [addButtonEnabled]="addButtonEnabled"
      [removeButtonEnabled]="removeButtonEnabled"
    ></lib-table-nav-form>
  </ng-container>
  <ng-container content>
    <ng-container [ngSwitch]="this.store.tab$ | async">
      <ng-container *ngSwitchCase="'data'">
        <lib-table-data-form
          [selectRows]="selectRows"
          [dispatchIsSelected]="dispatchIsSelected"
          [formModel]="formModel"
        ></lib-table-data-form>
      </ng-container>
      <ng-container *ngSwitchCase="'add'">
        <lib-table-add-form [store]="store" [formModel]="formModel"></lib-table-add-form>
      </ng-container>
      <ng-container *ngSwitchCase="'edit'">
        <lib-table-edit-form [store]="store" [formModel]="formModel"></lib-table-edit-form>
      </ng-container>
      <ng-container *ngSwitchDefault>
        <p>default</p>
      </ng-container>
    </ng-container>
  </ng-container>
  <ng-container paginator>
    <lib-table-paginator-form [selectPage]="selectPage" [dispatchPage]="dispatchPage"></lib-table-paginator-form>
  </ng-container>
</lib-table-panel-control>
