<lib-table-panel-control>
  <ng-container nav>
    <lib-table-nav-form
      [tableButtonEnabled]="tableButtonEnabled"
      [createButtonEnabled]="createButtonEnabled"
      [deleteButtonEnabled]="deleteButtonEnabled"
      [refreshButtonEnabled]="refreshButtonEnabled"
      [searchButtonEnabled]="searchButtonEnabled"
      (tableNavEvent)="onTableNavEvent($event)"
      (deleteEvent)="onDeleteEvent()"
      (refreshEvent)="onRefreshEvent()"
    ></lib-table-nav-form>
  </ng-container>
  <ng-container content>
    <ng-container [ngSwitch]="tab">
      <ng-container *ngSwitchCase="'table'">
        <p>table</p>
<!--        <lib-table-data-form-->
<!--          [dispatchDelete]="dispatchDelete"-->
<!--          [dispatchEdit]="dispatchEdit"-->
<!--          [selectRows]="selectRows"-->
<!--          [dispatchIsSelected]="dispatchIsSelected"-->
<!--          [formModel]="formModel"-->
<!--        ></lib-table-data-form>-->
      </ng-container>
      <ng-container *ngSwitchCase="'create'">
        <p>create</p>
<!--        <lib-table-create-form-->
<!--          [selectCreateResponse]="selectCreateResponse"-->
<!--          [dispatchCreate]="dispatchCreate"-->
<!--          [formModel]="formModel"-->
<!--        ></lib-table-create-form>-->
      </ng-container>
      <ng-container *ngSwitchCase="'update'">
        <p>update</p>
<!--        <lib-table-edit-form [dispatchTab]="dispatchTab" [formModel]="formModel"></lib-table-edit-form>-->
      </ng-container>
      <ng-container *ngSwitchCase="'search'">
        <p>search</p>
<!--        <lib-table-edit-form [dispatchTab]="dispatchTab" [formModel]="formModel"></lib-table-edit-form>-->
      </ng-container>
      <ng-container *ngSwitchDefault>
        <p>default</p>
      </ng-container>
    </ng-container>
  </ng-container>
  <ng-container paginator>
    <lib-table-paginator-form
      [page]="page"
      [maxPage]="maxPage"
      (tablePaginatorEvent)="onTablePaginatorEvent($event)"
    ></lib-table-paginator-form>
  </ng-container>
</lib-table-panel-control>
