<table class="table">
  <tr class="table__row">
    <td class="table__column"></td>
    <ng-container *ngFor="let header of getHeaders()">
      <td class="table__column">{{ header }}</td>
    </ng-container>
    <td class="table__column"></td>
  </tr>
  <ng-container *ngFor="let row of rows">
    <tr class="table__row">
      <td class="table__column table__button">
        <ng-container *ngIf="row.isSelected; else unselected">
          <lib-button-control [model]="selectedButtonModel" (event)="onUnselectEvent(row.id)"></lib-button-control>
        </ng-container>
        <ng-template #unselected>
          <lib-button-control [model]="unselectedButtonModel" (event)="onSelectEvent(row.id)"></lib-button-control>
        </ng-template>
      </td>
      <ng-container *ngFor="let header of getHeaders()">
        <td class="table__column">{{ getColumn(row.data, header) }}</td>
      </ng-container>
      <td class="table__column table__button">
        <lib-button-control [model]="removeButtonModel" (event)="onRemoveButtonEvent(row.id)"></lib-button-control>
      </td>
    </tr>
  </ng-container>
</table>
