<!-- done -->
<table class="table">
  <tr class="table__row table__row--head">
    <td class="table__button">
      <ng-container *ngIf="false; else unselected">
        <lib-button-control [model]="selectedButtonModel"></lib-button-control>
      </ng-container>
      <ng-template #unselected>
        <lib-button-control [model]="unselectedButtonModel"></lib-button-control>
      </ng-template>
    </td>
    <ng-container *ngFor="let header of getHeaders()">
      <td class="table__column">
        <lib-text-control textControlColor="primary">{{ header }}</lib-text-control>
      </td>
    </ng-container>
    <td class="table__button"></td>
    <td class="table__button"></td>
  </tr>
  <ng-container *ngFor="let row of rows">
    <tr class="table__row">
      <td class="table__button">
        <ng-container *ngIf="row.isSelected; else unselected">
          <lib-button-control [model]="selectedButtonModel" (click)="onUnselectEvent(row.id)"></lib-button-control>
        </ng-container>
        <ng-template #unselected>
          <lib-button-control [model]="unselectedButtonModel" (click)="onSelectEvent(row.id)"></lib-button-control>
        </ng-template>
      </td>
      <ng-container *ngFor="let header of getHeaders()">
        <td class="table__column">
          <lib-text-control textControlColor="dark-secondary">{{ getColumn(row.data, header) }}</lib-text-control>
        </td>
      </ng-container>
      <td class="table__button">
        <lib-button-control [model]="editButtonModel"></lib-button-control>
      </td>
      <td class="table__button">
        <lib-button-control [model]="removeButtonModel"></lib-button-control>
      </td>
    </tr>
  </ng-container>
</table>
