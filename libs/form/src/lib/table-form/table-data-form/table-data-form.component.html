<table class="table">
  <tr class="table__row">
    <ng-container *ngFor="let header of getHeaders()">
      <td class="table__column">{{ header }}</td>
    </ng-container>
  </tr>
  <ng-container *ngFor="let row of rows">
    <tr class="table__row">
      <ng-container *ngFor="let header of getHeaders()">
        <td class="table__column">{{ getColumn(row, header) }}</td>
      </ng-container>
      <td class="table__column table__button">
        <lib-button-control [model]="removeButtonModel" (event)="onRemoveButtonEvent(getRowId(row))"></lib-button-control>
      </td>
    </tr>
  </ng-container>
</table>
