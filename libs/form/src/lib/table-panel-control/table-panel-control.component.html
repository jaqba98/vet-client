<div class="table-control">
  <div class="table-control__nav">
    <ng-content select="[nav]"></ng-content>
  </div>
  <div class="table-control__content">
    <ng-content select="[content]"></ng-content>
  </div>
  <ng-container *ngIf="isPaginator">
    <div class="table-control__paginator">
      <ng-content select="[paginator]"></ng-content>
    </div>
  </ng-container>
</div>
